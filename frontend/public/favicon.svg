<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background matching --bg-base -->
  <rect width="32" height="32" rx="7" fill="#0c0f14"/>

  <!-- Income bar (amber, full width) -->
