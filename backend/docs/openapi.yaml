  /api/v1/transactions/q:
    get:
      tags: [Transactions]
      summary: Filtered list (query parameters)
      operationId: transactionsGetFiltered
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: Must be >= startDate when both are set
        - name: txtype
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: txcategory
          in: query
          schema:
            type: string
        - name: txgroup
          in: query
          schema:
            type: string
        - name: txitem
          in: query
          schema:
            type: string
        - name: txcurrency
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
        '400':
          description: Validation failed (including invalid date range)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

